apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backbone-io-test-kustomize
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/robpearson/kubernetes-apps.git
    targetRevision: HEAD
    path: kustomize/backbone-io/overlays/test
  destination:
    server: https://kubernetes.default.svc
    namespace: backbone-io-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Validate=false
      - CreateNamespace=true
